name: Build APK from ZIP

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Locate and unzip project
        id: unzip
        run: |
          ZIP_FILE=$(find . -iname "*.zip" -not -path "./extracted/*" -print -quit)
          if [ -z "$ZIP_FILE" ]; then
            echo "::error::No .zip file found in the repo."
            exit 1
          fi
          echo "Found zip: $ZIP_FILE"

          mkdir -p extracted
          unzip -q "$ZIP_FILE" -d extracted

          PROJECT_DIR=$(find extracted -maxdepth 4 -iname "settings.gradle*" -exec dirname {} \; | head -n 1)
          if [ -z "$PROJECT_DIR" ]; then
            echo "::error::Could not find settings.gradle(.kts) inside the zip - not a valid Gradle project."
            exit 1
          fi
          echo "Project dir: $PROJECT_DIR"
          echo "project_dir=$PROJECT_DIR" >> "$GITHUB_OUTPUT"

      - name: Fix known bad import in Type.kt
        run: |
          FILE=$(find "${{ steps.unzip.outputs.project_dir }}" -path "*/ui/theme/Type.kt")
          if [ -n "$FILE" ]; then
            sed -i 's/androidx\.compose\.ui\.font\./androidx.compose.ui.text.font./g' "$FILE"
            echo "Patched: $FILE"
          else
            echo "Type.kt not found - skipping patch"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Build debug APK
        working-directory: ${{ steps.unzip.outputs.project_dir }}
        run: gradle assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: ${{ steps.unzip.outputs.project_dir }}/app/build/outputs/apk/debug/*.apk
